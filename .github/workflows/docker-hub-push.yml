name: Docker Hub Build and Push

on:
  push:
    branches:
      - my

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      # 检出代码
      - name: Checkout
        uses: actions/checkout@v4
      
      # 设置QEMU用于多平台构建
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      # 设置Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      # 登录到Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      # 获取当前时间戳
      - name: Get current timestamp
        id: timestamp
        run: |
          echo "timestamp=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT
          echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT
          echo "year=$(date +'%Y')" >> $GITHUB_OUTPUT
      
      # 构建并推送Docker镜像
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ vars.DOCKER_USERNAME }}/open-lovable:latest
            ${{ vars.DOCKER_USERNAME }}/open-lovable:${{ steps.timestamp.outputs.timestamp }}
            ${{ vars.DOCKER_USERNAME }}/open-lovable:${{ steps.timestamp.outputs.date }}
            ${{ vars.DOCKER_USERNAME }}/open-lovable:${{ github.sha }}
          cache-from: type=registry,ref=${{ vars.DOCKER_USERNAME }}/open-lovable:buildcache
          cache-to: type=registry,ref=${{ vars.DOCKER_USERNAME }}/open-lovable:buildcache,mode=max
          build-args: |
            NODE_ENV=production
            BUILD_DATE=${{ steps.timestamp.outputs.timestamp }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ github.ref_name }}
      
      # 输出构建信息
      - name: Image digest
        run: |
          echo "## 🎉 Docker Image Published!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Image Tags:" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ vars.DOCKER_USERNAME }}/open-lovable:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ vars.DOCKER_USERNAME }}/open-lovable:${{ steps.timestamp.outputs.timestamp }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ vars.DOCKER_USERNAME }}/open-lovable:${{ steps.timestamp.outputs.date }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ vars.DOCKER_USERNAME }}/open-lovable:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📝 Build Information:" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Timestamp:** ${{ steps.timestamp.outputs.timestamp }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🚀 Pull Command:" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ vars.DOCKER_USERNAME }}/open-lovable:latest" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY